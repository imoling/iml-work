<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>iML Work · FDE 工作台</title>
<style>
  :root { --brand:#10b981; --border:#e5e7eb; --muted:#9ca3af; --sec:#6b7280; --text:#111827; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; color: var(--text); background:#f7f8fa; font-size:13px; }
  .top { padding:14px 18px; border-bottom:1px solid var(--border); background:#fff; display:flex; align-items:center; gap:10px; }
  .top .logo { height:30px; width:auto; display:block; }
  .top h1 { font-size:15px; margin:0; font-weight:700; }
  .crumb { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--sec); margin-bottom:4px; }
  .crumb a { color:var(--brand); cursor:pointer; }
  .home-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .cap-card { border:1px solid var(--border); border-radius:12px; padding:18px; background:#fff; cursor:pointer; transition:.15s; display:flex; flex-direction:column; gap:8px; }
  .cap-card:hover { border-color:var(--brand); box-shadow:0 4px 16px rgba(16,185,129,.1); }
  .cap-card.disabled { cursor:not-allowed; opacity:.6; background:#fafafa; }
  .cap-card.disabled:hover { border-color:var(--border); box-shadow:none; }
  .cap-ic { width:40px;height:40px;border-radius:10px; display:flex;align-items:center;justify-content:center; font-size:20px; background:rgba(16,185,129,.1); }
  .cap-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .cap-desc { font-size:12px; color:var(--sec); line-height:1.6; }
  .cap-badge { font-size:10px; padding:1px 7px; border-radius:10px; }
  .cap-badge.on { background:#ecfdf5; color:#059669; } .cap-badge.soon { background:#f1f5f9; color:#94a3b8; }
  .top .sub { font-size:11px; color:var(--muted); }
  .wrap { padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
  .hint { font-size:12px; color:var(--sec); line-height:1.6; background:rgba(16,185,129,.07); border:1px solid rgba(16,185,129,.2); border-radius:8px; padding:10px 12px; }
  label.fl { display:block; font-size:12px; color:var(--sec); margin-bottom:5px; font-weight:600; }
  input, select { width:100%; height:34px; padding:6px 10px; border:1px solid var(--border); border-radius:7px; font-size:13px; background:#fff; }
  .row { display:flex; gap:10px; }
  .row > div { flex:1; }
  .actions { display:flex; justify-content:flex-end; gap:10px; }
  button { height:34px; padding:0 14px; border-radius:8px; font-size:13px; border:1px solid var(--border); background:#fff; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  button.primary { background:var(--brand); color:#fff; border-color:var(--brand); }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .err { color:#ef4444; font-size:12px; }
  .ok { color:var(--brand); font-size:12px; }
  .recbar { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--sec); background:rgba(239,68,68,.06); border:1px solid rgba(239,68,68,.2); border-radius:8px; padding:10px 12px; }
  .dot { width:9px;height:9px;border-radius:50%;background:#ef4444; animation:pulse 1s infinite; }
  @keyframes pulse { 50% { opacity:.3; } }
  .steps { display:flex; flex-direction:column; gap:5px; max-height:360px; overflow-y:auto; border:1px solid var(--border); border-radius:8px; padding:6px; background:#fff; }
  .step { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; font-size:12px; }
  .step:nth-child(odd) { background:#fafafa; }
  .no { width:22px; color:var(--muted); flex-shrink:0; }
  .act { flex-shrink:0; font-size:11px; padding:1px 6px; border-radius:4px; background:#eef2ff; color:#4f46e5; }
  .act.fill { background:#ecfdf5; color:#059669; } .act.select { background:#fff7ed; color:#c2410c; }
  .lbl { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .val { color:var(--sec); font-size:11px; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .mark { display:inline-flex; align-items:center; gap:5px; flex-shrink:0; font-size:11px; color:var(--sec); }
  .mark input[type=text] { width:88px; height:24px; font-size:11px; padding:2px 6px; }
  .ty { width:auto; height:24px; font-size:11px; padding:0 6px; flex-shrink:0; }
  .wait { width:66px; height:24px; font-size:11px; padding:2px 6px; flex-shrink:0; }
  .opts { font-size:10px; color:#059669; background:#ecfdf5; border-radius:4px; padding:1px 6px; flex-shrink:0; cursor:help; }
  .build-sec { margin-top:14px; }
  .build-head { font-size:12px; font-weight:600; color:var(--sec); margin-bottom:6px; }
  .dry-run-tag { color:#ef4444; font-weight:400; }
  .dsl-box { font-family:'JetBrains Mono',monospace; font-size:11.5px; background:#0B1220; color:#9FE6C0; border-radius:8px; padding:10px 12px; white-space:pre; overflow-x:auto; max-height:180px; overflow-y:auto; margin:0; }
  .param-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 12px; }
  .param-row { display:flex; flex-direction:column; gap:3px; }
  .param-row label { font-size:11px; color:var(--sec); }
  .param-row input, .param-row select { height:30px; }
  .dry-console { font-family:'JetBrains Mono',monospace; font-size:11.5px; background:#0B1220; color:#cbd5e1; border-radius:8px; padding:10px 12px; white-space:pre-wrap; max-height:200px; overflow-y:auto; margin:0; }
  .step { flex-wrap:wrap; }
  .del { width:24px; height:24px; padding:0; color:#ef4444; border-color:transparent; background:transparent; flex-shrink:0; }
  .empty { text-align:center; color:var(--muted); padding:22px; font-size:12px; }
</style>
</head>
<body>
  <div class="top">
    <img class="logo" src="logo.svg" alt="iML Work" />
    <div><h1>iML Work · FDE 工作台</h1><div class="sub">面向 FDE 的技能构建工具 · 录制 → 生成语义脚本 → 可见浏览器试运行 → 同步到管理平台</div></div>
  </div>
  <div class="wrap" id="app"></div>
  <script src="renderer.js"></script>
</body>
</html>

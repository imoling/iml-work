server:
  port: 8080
  error:
    # 默认不外泄异常 message / 堆栈；需排障时按 ?message=true 单次开启，避免内部细节泄露到客户端。
    include-message: on_param
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: iml-work-admin-backend
  # Java 21 虚拟线程：阻塞式模型代理（HttpClient.send 占线程直到 LLM 返回）不再占死
  # Tomcat 平台线程，解除默认 200 线程的并发天花板。高并发关键开关。
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS:true}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # PostgreSQL + pgvector. Spin up infra via the bundled docker-compose.yml
  # (cd src/main/resources && docker compose up -d) before launching the service.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/imlwork}
    username: ${DB_USER:imlwork}
    password: ${DB_PASSWORD:imlwork}
    driver-class-name: org.postgresql.Driver
    # 连接池：默认 10 偏小，审计写+RAG 查询突发会在池上排队；上限须小于 PG max_connections。
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
  jpa:
    hibernate:
      # Flyway 接管 schema（见 db/migration/V*.sql）。ddl-auto 设 none：Hibernate 不再自动改表，
      # 避免非空表增列静默失败；加字段一律新增 V* 迁移。
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false
  # Flyway 版本化迁移。既有库(已由旧 ddl-auto 建全表)经 baseline-on-migrate 标记 V1 已应用、不重跑；
  # 全新库由 V1 一次建全。schema.sql 内容已并入 V1，sql.init 关闭避免双跑。
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: "existing schema baselined"
  sql:
    init:
      mode: never

# Enterprise unified model gateway (DLP proxy) upstream
model-proxy:
  target-url: ${MODEL_TARGET_URL:https://api.deepseek.com/v1/chat/completions}
  api-key: ${MODEL_API_KEY:}

# RAG vector store. embedding.endpoint, when set, calls an OpenAI-compatible
# /embeddings or TEI server (e.g. bge-large-zh). When empty the service falls
# back to a deterministic local feature-hashing embedding so retrieval still
# works against pgvector without an external model server.
rag:
  embedding:
    # 向量维度必须与模型输出一致（bge-m3 = 1024）。改这里要同步改 pgvector 列类型（见 Flyway V9）
    # 并重建全部向量（POST /api/v1/knowledge/reindex）——旧向量在新空间里毫无意义。
    dimension: ${EMBED_DIM:1024}
    # 默认接本机 Ollama 的 bge-m3（中文检索强、完全离线，契合"本地安全环境"）。
    # 不配 endpoint 会退化到**本地特征哈希兜底**——那不是语义模型，只做字面重叠：
    # 实测查「动态虾池」命中标题就叫《动态虾池》的文档，相似度只有 0.359，被相关性下限当噪声滤掉。
    # 部署到无 Ollama 的环境时，把 EMBED_ENDPOINT 指向任意 OpenAI 兼容的 /embeddings（TEI / 中转站）。
    endpoint: ${EMBED_ENDPOINT:http://localhost:11434/v1/embeddings}
    api-key: ${EMBED_API_KEY:}
    model: ${EMBED_MODEL:bge-m3}
  chunk:
    default-size: 280
    default-overlap: 40

# Server-side document parsing via docling-serve (IBM Docling). Run the
# container alongside this backend, e.g.:
#   docker run -p 5001:5001 ghcr.io/docling-project/docling-serve
# Converts PDF/DOCX/PPTX/XLSX/HTML/images to clean Markdown (tables/OCR kept),
# so client terminals stay light. Only user-uploaded documents are sent here —
# never credentials or login state. Empty endpoint => callers use basic parsing.
docling:
  endpoint: ${DOCLING_ENDPOINT:http://localhost:5001}
  convert-path: ${DOCLING_CONVERT_PATH:/v1/convert/file}
  timeout-ms: ${DOCLING_TIMEOUT_MS:120000}

# Docker Remote API endpoint for sandbox container monitoring. On macOS/Linux
# the default is the local unix socket; override with a tcp:// host for a
# remote / LAN docker daemon. The service degrades gracefully when unreachable.
sandbox:
  docker:
    host: ${DOCKER_HOST:unix:///var/run/docker.sock}
    api-version: ${DOCKER_API_VERSION:}
  # 代码执行并发闸：同时运行的容器数上限（防单机资源被打爆）+ 排队容量（超出即返回「繁忙」）。
  max-concurrent: ${SANDBOX_MAX_CONCURRENT:4}
  queue-capacity: ${SANDBOX_QUEUE_CAPACITY:20}

# 运行监控：actuator 只对外暴露 /actuator/health（负载均衡/K8s 探活用，免鉴权）。
# JVM/HTTP/Hikari 等指标不直接暴露，经 /api/v1/monitor/overview 聚合、按权限给管理端。
management:
  endpoints:
    web:
      exposure:
        include: health

# Swagger UI / OpenAPI (springdoc)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    org.springframework.web: INFO
    com.imlwork.admin: DEBUG
